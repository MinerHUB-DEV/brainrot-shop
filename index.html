<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e, #0a1a1f);
            font-family: 'Courier New', monospace;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #ff6a88, #ff99ac);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .roblox-link {
            margin: 15px 0;
        }

        .roblox-link a {
            color: #ffd966;
            text-decoration: none;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(0,0,0,0.7);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
            border-color: #ffd966;
        }

        .card h3 {
            margin-bottom: 10px;
            color: #ffd966;
        }

        .price {
            font-size: 24px;
            color: #2ed573;
            margin: 10px 0;
        }

        .buy-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: monospace;
            font-size: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            min-width: 300px;
        }

        .modal input {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            border-radius: 5px;
            border: none;
        }

        .close {
            background: #ff4757;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .admin-panel {
            background: rgba(0,0,0,0.7);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid white;
            padding: 10px;
            text-align: left;
        }

        .completed {
            color: #2ed573;
        }

        .pending {
            color: #ff4757;
        }

        button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 BRAINROT SHOP</h1>
            <div class="roblox-link">
                👤 <a href="https://www.roblox.com/users/profile?username=cayd3nisbetter" target="_blank">Follow @cayd3nisbetter on Roblox</a>
            </div>
            <p>✨ Buy a brainrot, get added on Roblox, and receive the file! ✨</p>
        </div>

        <div class="grid" id="brainrotGrid"></div>

        <div class="admin-panel">
            <h2>📋 ORDERS (Admin)</h2>
            <table id="ordersTable">
                <thead>
                    <tr>
                        <th>Buyer</th>
                        <th>Brainrot</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="ordersBody"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Complete Purchase</h3>
            <p id="modalBrainrot"></p>
            <p class="price" id="modalPrice"></p>
            <input type="text" id="robloxUser" placeholder="Your Roblox Username" required>
            <br>
            <button onclick="confirmPurchase()">Confirm Purchase</button>
            <br>
            <button class="close" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        let selectedBrainrot = null;

        const brainrots = [
            { id: 1, name: "Skibidi Toilet Brainrot", price: 19.99 },
            { id: 2, name: "Sigma Rizz Brainrot", price: 29.99 },
            { id: 3, name: "Fanum Tax Brainrot", price: 24.99 },
            { id: 4, name: "Gyatt Level 100 Brainrot", price: 39.99 },
            { id: 5, name: "Ohio Final Boss Brainrot", price: 49.99 },
            { id: 6, name: "Rizzler Alpha Brainrot", price: 34.99 },
            { id: 7, name: "Only in Ohio Brainrot", price: 14.99 },
            { id: 8, name: "Mewing Streak Brainrot", price: 24.99 }
        ];

        let orders = JSON.parse(localStorage.getItem('orders')) || [];

        function renderBrainrots() {
            const grid = document.getElementById('brainrotGrid');
            grid.innerHTML = '';
            brainrots.forEach(rot => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>🎮 ${rot.name}</h3>
                    <div class="price">$${rot.price}</div>
                    <button class="buy-btn" onclick="openModal(${rot.id})">BUY NOW</button>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(id) {
            selectedBrainrot = brainrots.find(r => r.id === id);
            document.getElementById('modalBrainrot').innerText = selectedBrainrot.name;
            document.getElementById('modalPrice').innerText = `$${selectedBrainrot.price}`;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('robloxUser').value = '';
            selectedBrainrot = null;
        }

        function confirmPurchase() {
            const robloxUser = document.getElementById('robloxUser').value.trim();
            if (!robloxUser) {
                alert('Enter your Roblox username!');
                return;
            }

            const order = {
                id: Date.now(),
                buyer: robloxUser,
                brainrot: selectedBrainrot.name,
                price: selectedBrainrot.price,
                status: 'pending',
                date: new Date().toLocaleString()
            };

            orders.unshift(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            renderOrders();
            closeModal();
            alert(`✅ Order placed! ${robloxUser} will be added on Roblox and get ${selectedBrainrot.name} via chat.`);
        }

        function renderOrders() {
            const tbody = document.getElementById('ordersBody');
            tbody.innerHTML = '';
            orders.forEach(order => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = order.buyer;
                row.insertCell(1).innerText = order.brainrot;
                row.insertCell(2).innerText = `$${order.price}`;
                row.insertCell(3).className = order.status === 'completed' ? 'completed' : 'pending';
                row.insertCell(3).innerText = order.status;
                row.insertCell(4).innerHTML = order.status === 'pending' ? 
                    `<button onclick="completeOrder(${order.id})">✓ Mark Completed</button>` : 
                    '✅ Done';
            });
        }

        function completeOrder(id) {
            const order = orders.find(o => o.id === id);
            if (order) {
                order.status = 'completed';
                localStorage.setItem('orders', JSON.stringify(orders));
                renderOrders();
                alert(`Order completed! ${order.buyer} should now have their brainrot.`);
            }
        }

        renderBrainrots();
        renderOrders();
    </script>
</body>
</html>
